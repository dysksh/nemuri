services:
  dev:
    build:
      context: .devcontainer
      dockerfile: Dockerfile
      target: dev
    user: ${USER_UID:-1000}:${USER_GID:-1000}
    volumes:
      - .:/workspace
      - /dev/null:/workspace/.env:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOME}/.gitconfig:${DEV_HOME:-/home/dev}/.gitconfig:ro
      - ${HOME}/.ssh:${DEV_HOME:-/home/dev}/.ssh:ro
      - ${HOME}/.aws:${DEV_HOME:-/home/dev}/.aws:ro
      - ${HOME}/.config/infracost:${DEV_HOME:-/home/dev}/.config/infracost:ro
      - ${HOME}/.config/nvim:${DEV_HOME:-/home/dev}/.config/nvim
      - nvim-data:${DEV_HOME:-/home/dev}/.local/share/nvim
    working_dir: /workspace
    env_file:
      - path: .env
        required: false
    environment:
      - AWS_PROFILE
      - AWS_REGION=${AWS_REGION:-ap-northeast-1}
      - HOME=${DEV_HOME:-/home/dev}
      - GOPATH=${DEV_HOME:-/home/dev}/go
    entrypoint: ["/workspace/scripts/entrypoint.sh"]

  claude:
    build:
      context: .devcontainer
      dockerfile: Dockerfile
      target: claude
    user: ${USER_UID:-1000}:${USER_GID:-1000}
    volumes:
      - .:/workspace
      - /dev/null:/workspace/.env:ro
      - /dev/null:/workspace/terraform/envs/dev/backend.conf:ro
      - /dev/null:/workspace/terraform/envs/dev/terraform.tfvars:ro
      - empty-terraform:/workspace/terraform/envs/dev/.terraform:ro
      - ${HOME}/.claude:${DEV_HOME:-/home/dev}/.claude
      - ${HOME}/.claude.json:${DEV_HOME:-/home/dev}/.claude.json
      - claude-gomodcache:${DEV_HOME:-/home/dev}/go/pkg/mod
    working_dir: /workspace
    environment:
      - HOME=${DEV_HOME:-/home/dev}
      - GOPATH=${DEV_HOME:-/home/dev}/go
    entrypoint: ["sleep", "infinity"]
    stdin_open: true
    tty: true

volumes:
  nvim-data:
  claude-gomodcache:
  empty-terraform:
